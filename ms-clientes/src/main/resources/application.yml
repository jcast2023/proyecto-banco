spring:
  application:
    name: ms-clientes
  
  r2dbc:
    url: r2dbc:postgresql://postgres-banco:5432/banco
    username: admin
    password: admin123

  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak-banco:8080/realms/banco-realm/protocol/openid-connect/certs
  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      # Esta ruta debe coincidir con lo que permitiste en SecurityConfig
      path: /swagger-ui.html
      operations-sorter: alpha
      # Importante para WebFlux
      use-root-path: true
    cache:
      disabled: true

  # Mantener esto solo si usas R2DBC puro sin dependencias de JDBC
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
      - org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

server:
  port: 8081

logging:
  level:
    com.banco.clientes: DEBUG